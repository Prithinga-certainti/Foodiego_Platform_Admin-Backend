name: CD

# CD pipeline — deploys the backend to Render after CI passes on main.
# It triggers Render via a Deploy Hook. Add the hook URL as a repo secret:
#   Settings > Secrets and variables > Actions > Secrets > RENDER_DEPLOY_HOOK_URL
#   (Render dashboard > your service > Settings > Deploy Hook > copy the URL)
# NOTE: turn OFF Render's native Auto-Deploy so this workflow is the single
# source of truth and the app doesn't deploy twice on every push.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Manual approval gate: configure "Required reviewers" on the `production`
    # environment (repo Settings > Environments) so this job waits for a human
    # to approve before it deploys.
    environment: production
    # Only deploy when CI succeeded (workflow_run), or when triggered manually.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::warning::RENDER_DEPLOY_HOOK_URL secret is not set — skipping deploy."
            echo "Add it under Settings > Secrets and variables > Actions > Secrets to enable CD."
            exit 0
          fi
          echo "Triggering Render deploy..."
          curl -fsSL -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo
          echo "Render deploy triggered successfully."
