# Render Blueprint — FoodieGo Platform Admin backend + free Postgres.
# In Render: New > Blueprint > pick this repo. Fill the sync:false secrets when prompted.
databases:
  - name: padmin-db
    plan: free

services:
  - type: web
    name: foodiego-platform-admin-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: padmin-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_EMAIL
        sync: false        # set in the Render dashboard (your admin login email)
      - key: ADMIN_PASSWORD
        sync: false        # set in the Render dashboard (your admin login password)
      - key: FRONTEND_URL
        value: https://prithinga-certainti.github.io
